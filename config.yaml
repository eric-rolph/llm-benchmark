# ─────────────────────────────────────────────────────────────────────────────
#  LLM Benchmark Suite — config.yaml
#  Run: python run.py --discover   to probe backends and list found models
#  Run: python run.py --help       for all CLI flags
# ─────────────────────────────────────────────────────────────────────────────

backends:
  # LM Studio  ─────────────────────────────────────────────────────────────
  lm_studio:
    enabled: true
    name: "LM Studio"
    base_url: "http://localhost:1234/v1"
    # WARNING: do not put a real API key here if this file is committed to git.
    # Use the env var  LLM_BENCH_LM_STUDIO_API_KEY  instead.
    # LM Studio accepts any non-empty string, so the placeholder is safe.
    api_key: "lm-studio"        # LM Studio accepts any non-empty key
    auto_discover: true         # Enumerate /v1/models on startup
    auto_load: true             # Use /api/v0/models/load before each model

  # Ollama  ─────────────────────────────────────────────────────────────────
  ollama:
    enabled: false              # Set true when Ollama is running
    name: "Ollama"
    base_url: "http://localhost:11434"
    auto_discover: true         # Queries /api/tags
    thinking: false             # Set true to send think=true for supported models

  # llama.cpp server  ───────────────────────────────────────────────────────
  llamacpp:
    enabled: false              # Set true when llama-server is running
    name: "llama.cpp"
    base_url: "http://localhost:8080"
    auto_discover: true         # Queries /v1/models

  # vLLM  ───────────────────────────────────────────────────────────────────
  vllm:
    enabled: false              # Set true when vLLM is running
    name: "vLLM"
    base_url: "http://localhost:8000"
    auto_discover: true         # Queries /v1/models

  # SGLang  ─────────────────────────────────────────────────────────────────
  sglang:
    enabled: false              # Set true when SGLang is running
    name: "SGLang"
    base_url: "http://localhost:30000"
    auto_discover: true         # Queries /v1/models

  # TensorRT-LLM  ───────────────────────────────────────────────────────────
  tensorrt:
    enabled: false              # Set true when TensorRT-LLM is running
    name: "TensorRT"
    base_url: "http://localhost:8000"
    auto_discover: true         # Queries /v1/models

  # TGI (Text Generation Inference)  ────────────────────────────────────────
  tgi:
    enabled: false              # Set true when TGI is running
    name: "TGI"
    base_url: "http://localhost:8080"
    auto_discover: true         # Queries /v1/models

  # KTransformers  ──────────────────────────────────────────────────────────
  ktransformers:
    enabled: false              # Set true when KTransformers is running
    name: "KTransformers"
    base_url: "http://localhost:8080"
    auto_discover: true         # Queries /v1/models

  # Generic OpenAI-compatible API (e.g. custom HF Transformers server)  ─────
  generic_openai:
    enabled: false
    name: "Generic OpenAI"
    base_url: "http://localhost:5000"
    auto_discover: true         # Queries /v1/models

# Optional manual model list.  Leave empty [] to rely on auto-discovery.
# Format:  "model-id"  (bare string, matched against any enabled backend)
# If populated, only these models are benchmarked (others from discovery skipped).
models: []
# models:
#   - "qwen/qwen3.6-35b-a3b"
#   - "google/gemma-4-31b"
#   - "google/gemma-4-26b-a4b"
#   - "nvidia.nemotron-cascade-2-30b-a3b"
#   - "qwen3.5-27b-claude-4.6-opus-reasoning-distilled"
#   - "llama3.2:latest"          # Ollama-style
#   - "qwen3:8b"                 # Ollama-style

benchmark:
  temperature: 0.0       # Deterministic — required for reproducible scoring (Auto-overridden by HF generation_config.json if found)
  max_tokens: 4096       # Must be large enough for thinking models (Auto-overridden by HF generation_config.json if found)
  timeout: 180           # Seconds before a single request is abandoned
  runs_per_task: 3       # Each task is run N times; score = mean ± std (statistical reliability)
  resume: false          # Set true (or use --resume) to skip already-completed (model, task) pairs

# LLM-as-judge (for tasks with scoring.type: llm_judge)
judge:
  enabled: false         # Set true and re-run to score subjective tasks
  model: null            # null = use first discovered model
