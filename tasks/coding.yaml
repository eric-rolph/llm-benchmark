  - id: code_012
    category: coding
    difficulty: easy
    description: "Count vowels (pass@k demo)"
    prompt: |
      Write a Python function called `count_vowels(s)` that returns the count of vowels
      (a, e, i, o, u — case-insensitive) in string s.
      Return only the Python code with no explanation.
    scoring:
      type: pass_at_k
      k: 2
      inner_type: code_exec
      test_code: |
