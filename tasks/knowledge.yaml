# tasks/knowledge.yaml — World knowledge, factual recall (harder)
# Scoring: numeric, exact, contains
# Goal: test facts that require genuine knowledge beyond grade-school trivia

- id: capital_france
  category: knowledge
  difficulty: easy
  prompt: "What is the capital of France? Answer with just the city name."
  scoring:
    type: contains
    value: "paris"

