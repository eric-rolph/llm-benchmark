# tasks/writing.yaml — Instruction-constrained writing tasks
# Tests: format compliance, brevity, tone, structure
# Scoring: line_count, contains, regex

- id: haiku_nature
  category: writing
  difficulty: easy
  prompt: |
    Write a haiku about nature. A haiku has exactly 3 lines.
    Output only the haiku, nothing else.
  scoring:
    type: line_count
    value: 3

- id: email_subject_line
  category: writing
  difficulty: easy
  prompt: |
    Write a professional email subject line for requesting a meeting to discuss Q3 budget.
    Output only the subject line, no extra text.
  scoring:
    type: regex
    pattern: "(?i)(meeting|request).{0,40}(budget|q3)|(budget|q3).{0,40}(meeting|request)"

- id: bullet_list_5
  category: writing
  difficulty: easy
  prompt: |
    List exactly 5 benefits of regular exercise.
    Format: one benefit per line, each starting with a dash (-).
    Output only the list, nothing else.
  scoring:
    type: line_count
    value: 5

- id: one_sentence_summary_ai
  category: writing
  difficulty: easy
  prompt: |
    Summarize what artificial intelligence is in exactly one sentence.
    Output only that sentence, nothing else.
  scoring:
    type: line_count
    value: 1

- id: tweet_length
  category: writing
  difficulty: easy
  prompt: |
    Write a tweet (max 280 characters) announcing a new product launch for a smart water bottle.
    Output only the tweet text.
  scoring:
    type: regex
    pattern: "(?i)(smart|water).{0,60}(bottle|launch|new|product)"

- id: numbered_steps
  category: writing
  difficulty: easy
  prompt: |
    Give exactly 4 steps for making a cup of tea.
    Format: numbered list (1. 2. 3. 4.)
    Output only the 4 steps.
  scoring:
    type: line_count
    value: 4

- id: apology_email_formal
  category: writing
  difficulty: medium
  prompt: |
    Write a one-paragraph formal apology email for missing a deadline.
    The paragraph must mention: the missed deadline, an apology, and a commitment to deliver.
    Output only the paragraph.
  scoring:
    type: regex
    pattern: "(?i)(apologize|sorry|apolog|regret).{0,200}(deadline|due).{0,200}(commit|deliver|ensure|promise)"

- id: product_description_50_words
  category: writing
  difficulty: easy
  prompt: |
    Write a product description for wireless noise-cancelling headphones in exactly 2 sentences.
    Output one sentence per line. Output only the 2 lines, nothing else.
  scoring:
    type: line_count
    value: 2

- id: pros_cons_list
  category: writing
  difficulty: easy
  prompt: |
    List 3 pros and 3 cons of working from home.
    Use "Pros:" and "Cons:" as section headers.
    Output only the list.
  scoring:
    type: regex
    pattern: "(?i)(pros?|cons?)"

- id: word_count_constraint
  category: writing
  difficulty: easy
  prompt: |
    Explain what a blockchain is in exactly 3 sentences.
    Output one sentence per line. Output only those 3 lines, nothing else.
  scoring:
    type: line_count
    value: 3

- id: persuasive_paragraph_rubric
  category: writing
  difficulty: hard
  description: "Persuasive paragraph — rubric-judged writing quality"
  prompt: |
    Write a single persuasive paragraph (100–150 words) arguing that cities should
    prioritize cycling infrastructure over expanding roads.
    Output only the paragraph, no headings or meta-commentary.
  scoring:
    type: rubric_judge
    criteria:
      - criterion: "The paragraph makes a clear, assertive central claim about cycling infrastructure"
        weight: 3.0
      - criterion: "At least one concrete supporting reason or evidence is provided (e.g. congestion, health, emissions)"
        weight: 2.0
      - criterion: "The paragraph acknowledges or rebuts a counter-argument or trade-off"
        weight: 2.0
      - criterion: "Tone is appropriately persuasive (not neutral/descriptive) and avoids clichés"
        weight: 1.0
      - criterion: "Word count is between 100 and 150 words"
        weight: 2.0

- id: feedback_sandwich_rubric
  category: writing
  difficulty: medium
  description: "Feedback sandwich — rubric-judged structure and tone"
  prompt: |
    Write a short piece of constructive feedback (3–5 sentences) for a colleague whose
    code works correctly but is difficult to read. Use the "feedback sandwich" structure:
    start with a positive, address the issue, end with encouragement.
    Output only the feedback, nothing else.
  scoring:
    type: rubric_judge
    criteria:
      - criterion: "Feedback opens with a genuine positive observation about the code"
        weight: 2.0
      - criterion: "The readability issue is clearly identified with a specific suggestion for improvement"
        weight: 3.0
      - criterion: "Feedback ends with an encouraging or forward-looking statement"
        weight: 2.0
      - criterion: "Tone is professional, specific, and non-condescending throughout"
        weight: 2.0
      - criterion: "Response is 3–5 sentences (not more, not less)"
        weight: 1.0
