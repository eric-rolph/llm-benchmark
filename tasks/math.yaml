tasks:
  - id: math_001
    category: math
    difficulty: medium
    description: "Average speed — harmonic mean trap"
    prompt: |
      A car travels from town A to town B at 60 km/h and returns at 40 km/h.
      What is the average speed for the entire round trip in km/h?
      Reply with only the number.
    scoring:
      type: numeric
      answer: 48
      tolerance: 0.1

  - id: math_002
    category: math
    difficulty: medium
    description: "Arithmetic sequence nth term"
    prompt: |
      In an arithmetic sequence, the 3rd term is 11 and the 9th term is 35.
      What is the 25th term?
      Reply with only the number.
    scoring:
      type: numeric
      answer: 99
      tolerance: 0

  - id: math_003
    category: math
    difficulty: hard
    description: "Modular exponentiation"
    prompt: |
      What is the remainder when 3^100 is divided by 7?
      Reply with only the number.
    scoring:
      type: numeric
      answer: 4
      tolerance: 0

  - id: math_004
    category: math
    difficulty: hard
    description: "Combinatorics — even 4-digit numbers"
    prompt: |
      How many 4-digit numbers can be formed using the digits 1, 2, 3, 4, 5
      with no digit repeated if the number must be even?
      Reply with only the number.
    scoring:
      type: numeric
      answer: 48
      tolerance: 0

  - id: math_005
    category: math
    difficulty: medium
    description: "Mixture problem"
    prompt: |
      A chemist mixes a 30% salt solution with a 10% salt solution to obtain
      200 mL of an 18% salt solution. How many mL of the 30% solution are needed?
      Reply with only the number.
    scoring:
      type: numeric
      answer: 80
      tolerance: 0

  - id: math_006
    category: math
    difficulty: easy
    description: "Dice outcomes for target sum"
    prompt: |
      How many ways can two standard 6-sided dice show a total of 9?
      Count ordered pairs (e.g., (3,6) and (6,3) are different).
      Reply with only the number.
    scoring:
      type: numeric
      answer: 4
      tolerance: 0

  - id: math_007
    category: math
    difficulty: easy
    description: "System of two equations"
    prompt: |
      Solve the system of equations:
        2x + 3y = 12
        x − y = 1
      What is the value of x + y?
      Reply with only the number.
    scoring:
      type: numeric
      answer: 5
      tolerance: 0

  - id: math_008
    category: math
    difficulty: easy
    description: "Compound interest"
    prompt: |
      A savings account holds $1,000 at 10% annual interest compounded once per year.
      What is the balance in dollars after 3 years?
      Reply with only the number.
    scoring:
      type: numeric
      answer: 1331
      tolerance: 0

  - id: math_009
    category: math
    difficulty: medium
    description: "Successive percentage discounts"
    prompt: |
      A jacket costs $80. It goes on sale for 25% off.
      At checkout, an additional 10% loyalty discount is applied to the sale price.
      What is the final price in dollars?
      Reply with only the number.
    scoring:
      type: numeric
      answer: 54
      tolerance: 0

  - id: math_010
    category: math
    difficulty: medium
    description: "Triangle angles — three unknowns"
    prompt: |
      In a triangle, angle A is twice angle B, and angle C is 30 degrees more than angle A.
      What is angle B in degrees?
      Reply with only the number.
    scoring:
      type: numeric
      answer: 30
      tolerance: 0
