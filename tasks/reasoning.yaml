tasks:
  - id: reason_001
    category: reasoning
    description: "Sheep trick question"
    prompt: "A farmer has 17 sheep. All but 9 die. How many sheep are left? Reply with only the number."
    scoring:
      type: numeric
      answer: 9
      tolerance: 0

  - id: reason_002
    category: reasoning
    description: "Machines-widgets scaling puzzle"
    prompt: "If it takes 5 machines 5 minutes to make 5 widgets, how long in minutes does it take 100 machines to make 100 widgets? Reply with only the number."
    scoring:
      type: numeric
      answer: 5
      tolerance: 0

  - id: reason_003
    category: reasoning
    description: "Valid syllogism"
    prompt: "All dogs are mammals. All mammals are warm-blooded. Therefore, are all dogs warm-blooded? Reply with only Yes or No."
    scoring:
      type: contains
      answer: "yes"

  - id: reason_004
    category: reasoning
    description: "Compound probability"
    prompt: "A biased coin lands heads 60% of the time. What is the probability of getting 2 heads in a row? Reply with only the decimal value (e.g. 0.36)."
    scoring:
      type: numeric
      answer: 0.36
      tolerance: 0.01

  - id: reason_005
    category: reasoning
    description: "Triangular number sequence"
    prompt: "What is the next number in this sequence: 1, 3, 6, 10, 15, ___? Reply with only the number."
    scoring:
      type: numeric
      answer: 21
      tolerance: 0

  - id: reason_006
    category: reasoning
    description: "Tower of Hanoi minimum moves"
    prompt: "What is the minimum number of moves required to solve the Tower of Hanoi puzzle with 3 disks? Reply with only the number."
    scoring:
      type: numeric
      answer: 7
      tolerance: 0

  - id: reason_007
    category: reasoning
    description: "Deductive logic — pets"
    prompt: |
      Alice, Bob, and Carol each own exactly one pet: a cat, a dog, or a fish.
      - Alice does not have the dog.
      - Bob does not have the cat.
      - Carol has the fish.
      What pet does Alice have? Reply with only the pet name.
    scoring:
      type: contains
      answer: "cat"

  - id: reason_008
    category: reasoning
    description: "Increasing-gap letter sequence"
    prompt: "What letter comes next: A, C, F, J, O, ___? Reply with only the letter."
    scoring:
      type: contains
      answer: "U"
