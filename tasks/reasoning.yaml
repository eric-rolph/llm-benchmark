tasks:
  - id: reason_001
    category: reasoning
    difficulty: medium
    description: "5-runner race deduction — jersey colour position"
    prompt: |
      Five runners finished a race wearing different coloured jerseys: Red, Blue, Green, Yellow, White.
      - Blue finished immediately after Red (Blue's position = Red's position + 1).
      - Green finished last (5th place).
      - White finished first (1st place).
      - Yellow did not finish last or second.
      - Red did not finish first.
      In what position did Red finish? Reply with only the number (1–5).
    scoring:
      type: numeric
      answer: 2
      tolerance: 0

  - id: reason_002
    category: reasoning
    difficulty: easy
    description: "4-person job deduction"
    prompt: |
      Four people — Ann, Bob, Carl, and Dee — each have a different job:
      doctor, teacher, chef, or programmer.
      - Ann is not the doctor.
      - Bob is neither the teacher nor the doctor.
      - Carl is the programmer.
      - Dee is not the teacher.
      Who is the doctor? Reply with only the person's name.
    scoring:
      type: contains
      answer: "dee"

  - id: reason_003
    category: reasoning
    difficulty: easy
    description: "Doubling-plus-one sequence"
    prompt: |
      What is the next number in this sequence: 3, 7, 15, 31, 63, ___?
      Reply with only the number.
    scoring:
      type: numeric
      answer: 127
      tolerance: 0

  - id: reason_004
    category: reasoning
    difficulty: medium
    description: "Pipe fill/drain rate"
    prompt: |
      Pipe A fills a tank in 4 hours. Pipe B fills it in 6 hours.
      A drain empties the full tank in 12 hours.
      If all three are open simultaneously, how many hours does it take to fill the tank?
      Reply with only the number.
    scoring:
      type: numeric
      answer: 3
      tolerance: 0

  - id: reason_005
    category: reasoning
    difficulty: easy
    description: "Day-of-week arithmetic"
    prompt: |
      Today is Wednesday. A project is due in 25 days.
      What day of the week is the due date?
      Reply with only the day name.
    scoring:
      type: contains
      answer: "sunday"

  - id: reason_006
    category: reasoning
    difficulty: medium
    description: "5-student score ordering"
    prompt: |
      Five students — Alex, Ben, Cara, Dee, and Eve — received distinct scores from
      the set {60, 70, 80, 90, 100} on an exam.
      - Dee scored the highest.
      - Eve scored 70.
      - Ben scored the lowest.
      - Cara scored exactly 20 more than Ben.
      - Alex scored more than Cara.
      What was Alex's score? Reply with only the number.
    scoring:
      type: numeric
      answer: 90
      tolerance: 0

  - id: reason_007
    category: reasoning
    difficulty: hard
    description: "5-fruit price ranking"
    prompt: |
      Five fruits — mango, pear, orange, kiwi, and peach — are priced differently.
      - Mango costs more than pear.
      - Kiwi costs less than orange.
      - Pear costs more than kiwi.
      - Orange is the 3rd most expensive.
      - Peach costs more than mango.
      What is pear's rank from most expensive to least (1 = most expensive)?
      Reply with only the number.
    scoring:
      type: numeric
      answer: 4
      tolerance: 0

  - id: reason_008
    category: reasoning
    difficulty: hard
    description: "Knights and knaves — self-referential claim"
    prompt: |
      On an island, knights always tell the truth and knaves always lie.
      Alex says: "We are both knaves." (referring to Alex and Sam)
      Is Alex a knight or a knave? Reply with only 'knight' or 'knave'.
    scoring:
      type: contains
      value: "knave"

  - id: reason_009
    category: reasoning
    difficulty: hard
    description: "Constraint satisfaction - who drinks water?"
    prompt: |
      There are three houses in a row: Red, Blue, and Green (from left to right).
      Three people live in them: Alice, Bob, and Charlie.
      Each person drinks a different beverage: Tea, Coffee, or Water.
      Each person has a different pet: Dog, Cat, or Bird.
      1. Alice lives in the Red house.
      2. The person with the Dog drinks Tea.
      3. Charlie has a Bird.
      4. The person in the Green house drinks Coffee.
      5. Bob lives next to the person with the Bird.
      6. The person in the Blue house has a Cat.
      Who drinks Water? Reply with only the person's name.
    scoring:
      type: contains
      value: "bob"

  - id: reason_010
    category: reasoning
    difficulty: hard
    description: "Knights, Knaves, and Spies"
    prompt: |
      You meet three people: A, B, and C. One is a Knight (always tells the truth),
      one is a Knave (always lies), and one is a Spy (can do either).
      A says: "C is the Knave."
      B says: "A is the Knight."
      C says: "I am the Spy."
      Reply with the roles in order for A, B, and C (e.g. 'A is the Knight, B is the Spy, C is the Knave').
    scoring:
      type: regex
      pattern: "(?i)knight.*?spy.*?knave"

  - id: reason_011
    category: reasoning
    difficulty: hard
    description: "Chronological scheduling with constraints"
    prompt: |
      Six tasks (U, V, W, X, Y, Z) must be scheduled one per day from Monday to Saturday.
      1. W must happen exactly two days after U.
      2. Y must happen on Thursday.
      3. X must happen before V.
      4. Z must happen exactly three days after X.
      On what day does V happen? Reply with only the day of the week.
    scoring:
      type: contains
      value: "saturday"
