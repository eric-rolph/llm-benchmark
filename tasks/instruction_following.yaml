tasks:
  - id: instruct_001
    category: instruction_following
    description: "Count letters in word"
    prompt: "How many letters are in the word MISSISSIPPI? Reply with only the number."
    scoring:
      type: numeric
      answer: 11
      tolerance: 0

  - id: instruct_002
    category: instruction_following
    description: "Count specific character"
    prompt: "Count the letter 'r' in the word 'strawberry'. Reply with only the number."
    scoring:
      type: numeric
      answer: 3
      tolerance: 0

  - id: instruct_003
    category: instruction_following
    description: "String reversal"
    prompt: "Reverse the string 'benchmark'. Reply with only the reversed string and nothing else."
    scoring:
      type: exact
      answer: "kramhcneb"

  - id: instruct_004
    category: instruction_following
    description: "JSON structured output"
    prompt: "Respond in valid JSON only — no markdown, no explanation. Include exactly these keys: 'capital' (string) and 'population_millions' (number) for the country France."
    scoring:
      type: json_keys
      keys: ["capital", "population_millions"]

  - id: instruct_005
    category: instruction_following
    description: "Translation"
    prompt: "Translate 'Good morning, how are you?' to Spanish. Respond with only the translation and nothing else."
    scoring:
      type: contains
      answer: "buenos"

  - id: instruct_006
    category: instruction_following
    description: "Chemical symbol recall"
    prompt: "What is the chemical symbol for gold? Reply with only the two-letter symbol and nothing else."
    scoring:
      type: exact
      answer: "Au"

  - id: instruct_007
    category: instruction_following
    description: "Exact list length"
    prompt: "List exactly 5 fruits, one per line. Use only the fruit names — no numbers, no bullets, no introduction, no explanation."
    scoring:
      type: line_count
      count: 5

  - id: instruct_008
    category: instruction_following
    description: "Reverse-order list"
    prompt: "List the months of the year in reverse order starting with December and ending with January, separated by commas. No other text."
    scoring:
      type: contains
      answer: "December"

  - id: instruct_009
    category: instruction_following
    description: "Word count constraint — 50 to 70 words"
    prompt: |
      Write a single paragraph explaining what photosynthesis is.
      Your response must contain between 50 and 70 words.
      No headers, bullet points, or lists — just a single prose paragraph.
    scoring:
      type: word_count
      min: 50
      max: 70

  - id: instruct_010
    category: instruction_following
    description: "Keyword repetition — 'network' at least 3 times"
    prompt: |
      Explain what the internet is in 2-4 sentences.
      You must use the word 'network' at least 3 times.
    scoring:
      type: contains_n
      answer: "network"
      min_count: 3

  - id: instruct_011
    category: instruction_following
    description: "Forbidden words — no 'pet', 'friend', or 'loyal'"
    prompt: |
      Describe what a dog is in exactly 2 sentences.
      Do not use the words 'pet', 'friend', or 'loyal' anywhere in your response.
    scoring:
      type: not_contains
      forbidden: ["pet", "friend", "loyal"]

  - id: instruct_012
    category: instruction_following
    description: "Response must end with a specific word"
    prompt: |
      Write one sentence about what makes the ocean important to life on Earth.
      The very last word of your response must be 'ocean'.
    scoring:
      type: ends_with
      answer: "ocean"

  - id: instruct_013
    category: instruction_following
    description: "Exactly 6 dash-prefixed bullet points"
    prompt: |
      List exactly 6 countries in Europe, one per line, each prefixed with a dash (e.g. "- France").
      No introduction, no explanation, no numbering — just the 6 dash-prefixed country names.
    scoring:
      type: line_count
      count: 6

  - id: instruct_014
    category: instruction_following
    description: "JSON output with three required keys for a city"
    prompt: |
      Respond in valid JSON only — no markdown fences, no explanation.
      Return an object with exactly these keys: "city" (string), "country" (string), "population_millions" (number).
      Use Tokyo, Japan as the subject.
    scoring:
      type: json_keys
      keys: ["city", "country", "population_millions"]

  - id: instruct_015
    category: instruction_following
    description: "No hedging/apology language in direct factual answer"
    prompt: |
      What is the boiling point of water at sea level in Celsius?
      Answer with only the number. Do not include any apology, hedging, or AI disclaimer.
    scoring:
      type: not_contains
      forbidden: ["sorry", "cannot", "as an ai", "i apologize", "unable", "i'm not"]
